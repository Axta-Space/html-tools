<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GSO Beam · Globe V2</title>
<style>
  /* ── FIX #1: All CSS custom properties use correct double-hyphen syntax ── */
  :root {
    --bg: #f5f5f0;
    --panel: #ffffff;
    --border: #d0cfc8;
    --border2: #b8b6ae;
    --accent: #1a6ab5;
    --accent2: #c94a0a;
    --text: #1a1a18;
    --muted: #7a7870;
    --track: #dddbd4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    overflow: hidden;
    touch-action: none;
    user-select: none;
  }
  body { display: flex; flex-direction: column; }
  #app { display: flex; flex-direction: column; flex: 1; min-height: 0; }

  header {
    flex-shrink: 0;
    display: flex; align-items: center; gap: 8px;
    padding: 7px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  header h1  { font-size: 11px; letter-spacing: .18em; color: var(--accent); text-transform: uppercase; }
  header .sub { font-size: 9px; color: var(--muted); letter-spacing: .08em; flex: 1; }
  header .ver { font-size: 9px; color: var(--border2); letter-spacing: .05em; }

  #globe-wrap {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    background: var(--bg);
  }
  svg#globe { display: block; touch-action: none; }

  .sphere    { fill: #ffffff; stroke: #1a1a18; stroke-width: 1; }
  .graticule { fill: none; stroke: #d8d6cf; stroke-width: .4; }
  .land      { fill: #eeecea; stroke: #1a1a18; stroke-width: .6; }

  .beam-path { stroke-linejoin: round; cursor: grab; }
  .beam-path.dragging { cursor: grabbing; }

  #zoom-btns {
    position: absolute; right: 10px; top: 50%;
    transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 4px;
  }
  .zoom-btn {
    width: 36px; height: 36px;
    background: var(--panel); border: 1px solid var(--border2);
    border-radius: 5px; font-size: 20px; font-weight: bold;
    font-family: 'Courier New', monospace; color: var(--accent);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 3px rgba(0,0,0,.1);
    -webkit-tap-highlight-color: transparent;
  }
  .zoom-btn:active { background: var(--track); }

  #hint {
    position: absolute; bottom: 5px; left: 50%;
    transform: translateX(-50%);
    font-size: 8px; color: var(--muted); letter-spacing: .08em;
    pointer-events: none; white-space: nowrap; opacity: .7;
  }

  #beam-list {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    background: var(--panel);
    overflow-x: auto;
    display: flex; align-items: stretch;
    min-height: 36px;
  }
  .beam-tab {
    display: flex; align-items: center; gap: 4px;
    padding: 0 8px;
    border-right: 1px solid var(--border);
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
    font-size: 11px; font-weight: bold;
    color: var(--muted); background: var(--bg);
    -webkit-tap-highlight-color: transparent;
  }
  .beam-tab.active { background: var(--panel); color: var(--text); }
  .beam-tab .swatch { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .beam-tab .del-btn {
    font-size: 13px; line-height: 1;
    color: var(--muted); cursor: pointer; padding: 2px 1px;
    -webkit-tap-highlight-color: transparent;
  }
  .beam-tab .del-btn:active { color: var(--accent2); }

  #add-beam-btn {
    display: flex; align-items: center; justify-content: center;
    padding: 0 12px; font-size: 18px; font-weight: bold;
    color: var(--accent); cursor: pointer; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  #add-beam-btn:active { background: var(--track); }
  /* FIX #15: proper disabled state via both class and attribute */
  #add-beam-btn.disabled,
  #add-beam-btn[disabled] { color: var(--border2); pointer-events: none; }

  #info {
    flex-shrink: 0;
    display: grid; grid-template-columns: repeat(3,1fr);
    border-top: 1px solid var(--border);
    background: var(--border); gap: 1px;
  }
  .info-cell {
    background: var(--panel); padding: 5px 8px;
    display: flex; flex-direction: column; gap: 1px;
  }
  .info-cell .lbl { font-size: 7px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }
  .info-cell .val { font-size: 11px; color: var(--accent); font-weight: bold; }
  .info-cell .val.red { color: var(--accent2); }

  #controls {
    flex-shrink: 0; display: flex;
    border-top: 1px solid var(--border);
    background: var(--panel);
  }
  .ctrl {
    flex: 1; display: flex; flex-direction: column; gap: 2px;
    padding: 5px 6px; border-right: 1px solid var(--border);
  }
  .ctrl:last-child { border-right: none; }
  .ctrl .lbl { font-size: 7px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; }
  .ctrl input[type=number] {
    width: 100%;
    font-family: 'Courier New', monospace;
    font-size: 16px; font-weight: bold;
    color: var(--accent); background: var(--bg);
    border: 1px solid var(--border); border-radius: 3px;
    padding: 3px 4px; outline: none;
    -moz-appearance: textfield;
  }
  .ctrl input[type=number]::-webkit-inner-spin-button,
  .ctrl input[type=number]::-webkit-outer-spin-button { opacity: 1; height: 22px; }
  .ctrl input[type=number]:focus { border-color: var(--accent); }
  /* ── HOME NAV ── */
  .home-nav { flex-shrink: 0; background: var(--panel); border-bottom: 1px solid var(--border); padding-top: env(safe-area-inset-top, 0); display: flex; align-items: center; justify-content: space-between; }
  .home-nav__link { display: inline-flex; align-items: center; gap: 6px; padding: 0 14px; min-height: 44px; font-family: system-ui, sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 0.04em; text-decoration: none; color: var(--muted); touch-action: manipulation; -webkit-tap-highlight-color: transparent; transition: color 0.15s; }
  .home-nav__arrow { font-size: 14px; transition: transform 0.15s; }
  @media (hover: hover) { .home-nav__link:hover { color: var(--accent); } .home-nav__link:hover .home-nav__arrow { transform: translateX(-3px); } }
  .home-nav__link:active { color: var(--accent); }
  .home-nav__meta { padding: 0 14px; font-family: system-ui, sans-serif; font-size: 11px; color: var(--muted); opacity: 0.7; letter-spacing: 0.03em; }
</style>

<body>

<div id="app">

  <div id="controls">
    <div class="ctrl"><span class="lbl">Sat Lon</span>
      <input type="number" id="sl-satlon" min="-180" max="180" value="33" step="1"></div>
    <div class="ctrl"><span class="lbl">Major °</span>
      <input type="number" id="sl-major" min="0.1" max="20" value="2.0" step="0.1"></div>
    <div class="ctrl"><span class="lbl">Minor °</span>
      <input type="number" id="sl-minor" min="0.1" max="20" value="2.0" step="0.1"></div>
    <div class="ctrl"><span class="lbl">Rot °</span>
      <input type="number" id="sl-rot" min="-180" max="180" value="0" step="1"></div>
    <div class="ctrl"><span class="lbl">Min Elev °</span>
      <input type="number" id="sl-elev" min="0" max="30" value="5" step="1"></div>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
// ── FIX #13: Named constants — no magic numbers scattered inline ──────────────
const WGS84       = { a: 6378137.0, b: 6356752.3142 };
const GSO_ALT_M   = 35786000;  // GEO orbit altitude, metres
const D2R         = Math.PI / 180;
const R2D         = 180 / Math.PI;
const GLOBE_RATIO = 0.47;      // base globe radius as fraction of min(W,H)
const LAT_CLAMP   = 85;        // max |boreLat| in degrees
const GLOBE_SENS  = 0.25;      // globe drag sensitivity, deg/px at zoom=1
const ZOOM_MIN    = 0.5;
const ZOOM_MAX    = 8;
const ZOOM_WHEEL  = 1.12;      // zoom factor per scroll tick
const ZOOM_BTN    = 1.25;      // zoom factor per button press
const N_VERTS     = 360;       // beam polygon vertex count
const MAX_BEAMS   = 16;

// ── Vector math ──────────────────────────────────────────────────────────────
const norm  = v => { const l = Math.hypot(...v); return v.map(x => x / l); };
const dot   = (a, b) => a[0]*b[0] + a[1]*b[1] + a[2]*b[2];
const cross = (a, b) => [
  a[1]*b[2] - a[2]*b[1],
  a[2]*b[0] - a[0]*b[2],
  a[0]*b[1] - a[1]*b[0]
];

// ── WGS-84 geodetic conversions ───────────────────────────────────────────────
function lla2ecef(lat, lon, alt = 0) {
  const { a, b } = WGS84, a2 = a*a, b2 = b*b;
  const φ = lat * D2R, λ = lon * D2R;
  const N = a2 / Math.sqrt(a2 * Math.cos(φ)**2 + b2 * Math.sin(φ)**2);
  return [
    (N + alt) * Math.cos(φ) * Math.cos(λ),
    (N + alt) * Math.cos(φ) * Math.sin(λ),
    (b2/a2 * N + alt) * Math.sin(φ)
  ];
}

function ecef2lla(x, y, z) {
  const { a, b } = WGS84, a2 = a*a, b2 = b*b;
  const e2 = (a2 - b2) / a2, ep2 = (a2 - b2) / b2;
  const p  = Math.hypot(x, y);
  const θ  = Math.atan2(z * a, p * b);
  const lat = Math.atan2(
    z  + ep2 * b * Math.sin(θ)**3,
    p  - e2  * a * Math.cos(θ)**3
  );
  const N = a2 / Math.sqrt(a2 * Math.cos(lat)**2 + b2 * Math.sin(lat)**2);
  return [lat * R2D, Math.atan2(y, x) * R2D, p / Math.cos(lat) - N];
}

// Nearest positive-t ray–WGS84-ellipsoid intersection, or null
function rayEllipsoid(O, D) {
  const { a, b } = WGS84, a2 = a*a, b2 = b*b;
  const [ox, oy, oz] = O, [dx, dy, dz] = D;
  const A =  dx*dx/a2 + dy*dy/a2 + dz*dz/b2;
  const B = 2*(ox*dx/a2 + oy*dy/a2 + oz*dz/b2);
  const C =  ox*ox/a2 + oy*oy/a2 + oz*oz/b2 - 1;
  const disc = B*B - 4*A*C;
  if (disc < 0) return null;
  const sq = Math.sqrt(disc);
  const t1 = (-B - sq) / (2*A), t2 = (-B + sq) / (2*A);
  const t  = t1 > 0 ? t1 : t2 > 0 ? t2 : null;
  if (t === null) return null;
  return [ox + t*dx, oy + t*dy, oz + t*dz];
}

// Rodrigues' rotation: rotate v around unit axis k by angle θ (radians)
function rodrigues(v, k, θ) {
  const c = Math.cos(θ), s = Math.sin(θ), d = dot(v, k), cr = cross(k, v);
  return v.map((_, i) => v[i]*c + cr[i]*s + k[i]*d*(1 - c));
}

// Elevation angle (degrees) from ground point [lat,lon] up to satellite ECEF position
function elevAtLatLon(satE, lat, lon) {
  const G     = lla2ecef(lat, lon, 0);
  const toSat = norm(satE.map((v, i) => v - G[i]));
  const φ = lat * D2R, λ = lon * D2R;
  const up = [Math.cos(φ)*Math.cos(λ), Math.cos(φ)*Math.sin(λ), Math.sin(φ)];
  return Math.asin(Math.max(-1, Math.min(1, dot(toSat, up)))) * R2D;
}

// Elevation (deg) and slant range (km) from ground [lat,lon] to GEO satellite at satLon
function elevSlant(satLon, lat, lon) {
  const S     = lla2ecef(0, satLon, GSO_ALT_M);
  const G     = lla2ecef(lat, lon, 0);
  const toSat = S.map((v, i) => v - G[i]);
  const φ = lat * D2R, λ = lon * D2R;
  const up = [Math.cos(φ)*Math.cos(λ), Math.cos(φ)*Math.sin(λ), Math.sin(φ)];
  return {
    elev:    Math.asin(dot(norm(toSat), up)) * R2D,
    slantKm: Math.hypot(...toSat) / 1000
  };
}

// ── FIX #7 + deduplication: shared beam-local coordinate frame ───────────────
// Extracted from both computeBeam and computeAxisTips to avoid code duplication
// and to properly handle the near-polar Rodrigues fallback.
function beamFrame(satLon, boreLat, boreLon) {
  const satE    = lla2ecef(0, satLon, GSO_ALT_M);
  const boreE   = lla2ecef(boreLat, boreLon, 0);
  const boreDir = norm(boreE.map((v, i) => v - satE[i]));

  // Project world-Z onto the plane perpendicular to boreDir → north tangent
  const worldZ = [0, 0, 1];
  let northRaw = worldZ.map((v, i) => v - dot(worldZ, boreDir) * boreDir[i]);

  // FIX #7: near-polar fallback — use world-Y and *also* project it properly
  if (Math.hypot(...northRaw) < 1e-6) {
    const worldY = [0, 1, 0];
    northRaw = worldY.map((v, i) => v - dot(worldY, boreDir) * boreDir[i]);
  }

  const north_hat = norm(northRaw);
  const east_hat  = norm(cross(north_hat, boreDir));
  return { satE, boreDir, north_hat, east_hat };
}

// Beam polygon [lon,lat] ring clipped to minElev elevation mask
function computeBeam(satLon, boreLat, boreLon, majorDeg, minorDeg, rotDeg, minElev) {
  const { satE, boreDir, north_hat, east_hat } = beamFrame(satLon, boreLat, boreLon);
  const rotR = rotDeg * D2R, cosR = Math.cos(rotR), sinR = Math.sin(rotR);
  const major_hat = east_hat.map((_, i) =>  cosR * east_hat[i] + sinR * north_hat[i]);
  const minor_hat = east_hat.map((_, i) => -sinR * east_hat[i] + cosR * north_hat[i]);
  const a = majorDeg / 2 * D2R, b = minorDeg / 2 * D2R;

  const raw = [];
  for (let i = 0; i < N_VERTS; i++) {
    const phi = 2 * Math.PI * i / N_VERTS;
    const cosPhi = Math.cos(phi), sinPhi = Math.sin(phi);
    const r = (a * b) / Math.sqrt((b*cosPhi)**2 + (a*sinPhi)**2);
    const sweepDir = norm(major_hat.map((_, j) => cosPhi*major_hat[j] + sinPhi*minor_hat[j]));
    const ray = norm(rodrigues(boreDir, sweepDir, r));
    const hit = rayEllipsoid(satE, ray);
    if (!hit) { raw.push(null); continue; }
    const [lat, lon] = ecef2lla(...hit);
    raw.push(elevAtLatLon(satE, lat, lon) >= minElev ? [lon, lat] : null);
  }

  if (raw.every(v => v === null)) return null;

  const coords = [];
  for (let i = 0; i < N_VERTS; i++) {
    const cur  = raw[i];
    const next = raw[(i + 1) % N_VERTS];
    if (cur  !== null) coords.push(cur);
    if (cur  === null && next !== null) coords.push(next);
  }
  if (coords.length < 3) return null;
  coords.push(coords[0]);
  return coords;
}

// Four axis-tip ground points: [+major, −major, +minor, −minor]
// Returns null per element if below horizon / minElev
function computeAxisTips(satLon, boreLat, boreLon, majorDeg, minorDeg, rotDeg, minElev) {
  const { satE, boreDir, north_hat, east_hat } = beamFrame(satLon, boreLat, boreLon);
  const rotR = rotDeg * D2R, cosR = Math.cos(rotR), sinR = Math.sin(rotR);
  const major_hat = east_hat.map((_, i) =>  cosR * east_hat[i] + sinR * north_hat[i]);
  const minor_hat = east_hat.map((_, i) => -sinR * east_hat[i] + cosR * north_hat[i]);
  const a = majorDeg / 2 * D2R, b = minorDeg / 2 * D2R;

  return [
    [major_hat,              a],
    [major_hat.map(v => -v), a],
    [minor_hat,              b],
    [minor_hat.map(v => -v), b]
  ].map(([dir, r]) => {
    const ray = norm(rodrigues(boreDir, norm(dir), r));
    const hit = rayEllipsoid(satE, ray);
    if (!hit) return null;
    const [lat, lon] = ecef2lla(...hit);
    return elevAtLatLon(satE, lat, lon) >= minElev ? [lon, lat] : null;
  });
}

// ── FIX #8: longitude normalisation to [−180, 180] ───────────────────────────
function wrapLon(lon) {
  lon = lon % 360;
  if (lon >  180) lon -= 360;
  if (lon < -180) lon += 360;
  return lon;
}

// ── Colour palette ────────────────────────────────────────────────────────────
const COLORS = [
  '#1a6ab5','#c94a0a','#2a9d4e','#7b3fa0',
  '#c4920a','#0a8a9d','#c41a5a','#5a7a0a',
  '#0a4ac4','#9d2a0a','#0a9d7b','#7a0ac4',
  '#c4700a','#0a6ac4','#9d0a5a','#4a9d0a'
];

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${a})`;
}

// ── App state ─────────────────────────────────────────────────────────────────
// FIX #13: renamed from 'global' (would shadow window.global in strict environments)
const cfg  = { satLon: 33, minElev: 5 };
let beams      = [];
let selectedId = null;
let nextId     = 1;

// ── D3 globe ──────────────────────────────────────────────────────────────────
const wrap = document.getElementById('globe-wrap');
const svg  = d3.select('#globe');
let W, H, baseR, R, zoomScale = 1;

const projection = d3.geoOrthographic().rotate([-33, -20]).clipAngle(90);

// FIX #17: path is created once. projection is mutable, so the same path
// instance stays valid after projection.rotate() / .scale() / .translate().
// No more "path = d3.geoPath(projection)" scattered across the codebase.
const geoPath = d3.geoPath(projection);

const lyrSphere = svg.append('g');
const lyrGrat   = svg.append('g');
const lyrLand   = svg.append('g');
const lyrBeam   = svg.append('g');

const sphereEl  = lyrSphere.append('circle').attr('class', 'sphere');
const gratEl    = lyrGrat.append('path').attr('class', 'graticule');
let   landPaths = null;

// ── FIX #16: rAF-throttled redraw ────────────────────────────────────────────
let rafId       = null;
let rafDragging = false;

function scheduleRedraw(dragging = false) {
  if (dragging) rafDragging = true;
  if (rafId !== null) return;        // already queued for this frame
  rafId = requestAnimationFrame(() => {
    rafId = null;
    const d = rafDragging;
    rafDragging = false;
    _redraw(d);
  });
}

function _redraw(dragging) {
  sphereEl.attr('cx', W/2).attr('cy', H/2).attr('r', R);
  gratEl.attr('d', geoPath(d3.geoGraticule()()));
  if (landPaths) landPaths.attr('d', d => geoPath(d));

  const { satLon, minElev } = cfg;

  beams.forEach(beam => {
    const isSel  = beam.id === selectedId;
    const coords = computeBeam(satLon, beam.boreLat, beam.boreLon,
                               beam.major, beam.minor, beam.rot, minElev);

    beam.svgEl
      .attr('fill',         hexToRgba(beam.color, isSel ? 0.18 : 0.08))
      .attr('stroke',       beam.color)
      .attr('stroke-width', isSel ? 0.625 : 0.375)
      .classed('dragging',  dragging && isSel);

    if (coords) {
      beam.svgEl
        .datum({ type: 'Feature', geometry: { type: 'Polygon', coordinates: [coords] } })
        .attr('d', geoPath);
    } else {
      beam.svgEl.attr('d', '');
    }

    // FIX #5/#6: exactly 2 tickEls per beam — major-axis line (index 0) and
    // minor-axis line (index 1). No wasted elements, no redundant zeroing.
    const tips = computeAxisTips(satLon, beam.boreLat, beam.boreLon,
                                 beam.major, beam.minor, beam.rot, minElev);
    [[0, 1], [2, 3]].forEach(([ai, bi], tickIdx) => {
      const tipA = tips[ai], tipB = tips[bi];
      const el   = beam.tickEls[tickIdx];
      if (tipA && tipB) {
        const pA = projection([tipA[0], tipA[1]]);
        const pB = projection([tipB[0], tipB[1]]);
        if (pA && pB) {
          el.attr('x1', pA[0]).attr('y1', pA[1])
            .attr('x2', pB[0]).attr('y2', pB[1])
            .attr('stroke-width', isSel ? 0.8 : 0.4)
            .attr('opacity', 0.9);
          return;
        }
      }
      el.attr('x1', 0).attr('y1', 0).attr('x2', 0).attr('y2', 0);
    });
  });

  const sel = selectedBeam();
  if (sel) {
    const { elev, slantKm } = elevSlant(cfg.satLon, sel.boreLat, sel.boreLon);
    const latStr = Math.abs(sel.boreLat).toFixed(1) + '°' + (sel.boreLat >= 0 ? 'N' : 'S');
    const lonStr = Math.abs(sel.boreLon).toFixed(1) + '°' + (sel.boreLon >= 0 ? 'E' : 'W');
    document.getElementById('i-bore').textContent  = latStr + ' ' + lonStr;
    document.getElementById('i-elev').textContent  = elev.toFixed(1) + '°';
    document.getElementById('i-slant').textContent = slantKm.toFixed(0) + ' km';
  } else {
    document.getElementById('i-bore').textContent  = '—';
    document.getElementById('i-elev').textContent  = '—';
    document.getElementById('i-slant').textContent = '—';
  }
}

// ── Zoom ──────────────────────────────────────────────────────────────────────
function applyZoom() {
  R = baseR * zoomScale;
  projection.translate([W/2, H/2]).scale(R);
  // FIX #17: no geoPath reassignment needed
  scheduleRedraw();
}

// ── Beam CRUD ─────────────────────────────────────────────────────────────────
function addBeam(boreLat = 20, boreLon = null, major = null, minor = null, rot = null) {
  if (beams.length >= MAX_BEAMS) return;
  const prev = beams.length > 0 ? beams[beams.length - 1] : null;
  // FIX #3: fallback uses cfg.satLon (live value) not a stale closure over 'global'
  const inheritLon   = boreLon !== null ? boreLon : (prev ? prev.boreLon : cfg.satLon);
  const inheritMajor = major   !== null ? major   : (prev ? prev.major   : 2.0);
  const inheritMinor = minor   !== null ? minor   : (prev ? prev.minor   : 2.0);
  const inheritRot   = rot     !== null ? rot     : (prev ? prev.rot     : 0);

  const id    = nextId++;
  const color = COLORS[(id - 1) % COLORS.length];

  const svgEl = lyrBeam.append('path')
    .attr('class',  'beam-path')
    .attr('fill',   hexToRgba(color, 0.12))
    .attr('stroke', color)
    .datum({ id });

  // FIX #5: exactly 2 tickEls — one for major axis, one for minor axis
  const tickEls = [0, 1].map(() =>
    lyrBeam.append('line')
      .attr('stroke',         color)
      .attr('stroke-width',   0.8)
      .attr('stroke-linecap', 'round')
  );

  beams.push({ id, boreLat, boreLon: inheritLon,
               major: inheritMajor, minor: inheritMinor,
               rot: inheritRot, color, svgEl, tickEls });
  selectedId = id;
  renderBeamList();
  syncInputs();
  scheduleRedraw();
}

function deleteBeam(id) {
  const beam = beams.find(b => b.id === id);
  if (beam) { beam.svgEl.remove(); beam.tickEls.forEach(t => t.remove()); }
  beams = beams.filter(b => b.id !== id);
  if (selectedId === id) selectedId = beams.length ? beams[beams.length - 1].id : null;
  renderBeamList();
  syncInputs();
  scheduleRedraw();
}

function selectedBeam() { return beams.find(b => b.id === selectedId) || null; }

function syncInputs() {
  const b = selectedBeam();
  document.getElementById('sl-major').value = b ? b.major : 2.0;
  document.getElementById('sl-minor').value = b ? b.minor : 2.0;
  document.getElementById('sl-rot').value   = b ? b.rot   : 0;
  // FIX #4: dead syncBwInput() removed — #sl-bw element never existed
}

// ── Beam list UI ──────────────────────────────────────────────────────────────
function renderBeamList() {
  const list   = document.getElementById('beam-list');
  const addBtn = document.getElementById('add-beam-btn');
  list.querySelectorAll('.beam-tab').forEach(el => el.remove());

  beams.forEach(beam => {
    const tab = document.createElement('div');
    tab.className  = 'beam-tab' + (beam.id === selectedId ? ' active' : '');
    tab.dataset.id = beam.id;

    const swatch = document.createElement('div');
    swatch.className       = 'swatch';
    swatch.style.background = beam.color;

    const label = document.createElement('span');
    label.textContent = 'B' + beam.id;

    const del = document.createElement('span');
    del.className   = 'del-btn';
    del.textContent = '×';
    del.addEventListener('click',    e => { e.stopPropagation(); deleteBeam(beam.id); });
    del.addEventListener('touchend', e => { e.stopPropagation(); e.preventDefault(); deleteBeam(beam.id); });

    tab.appendChild(swatch);
    tab.appendChild(label);
    tab.appendChild(del);
    tab.addEventListener('click', () => {
      selectedId = beam.id;
      renderBeamList(); syncInputs(); scheduleRedraw();
    });
    list.insertBefore(tab, addBtn);
  });

  const full = beams.length >= MAX_BEAMS;
  addBtn.textContent = full ? String(MAX_BEAMS) : '+';
  // FIX #15: set both .disabled class AND the disabled attribute
  addBtn.classList.toggle('disabled', full);
  addBtn.toggleAttribute('disabled', full);
}

// ── Interaction ───────────────────────────────────────────────────────────────
let dragMode   = null;
let rotStart   = null, rotOrigin  = null;
let beamPx0    = null, boreLat0   = 0, boreLon0 = 0, dragBeamId = null;
let pinchD0    = null;

// Pixel delta → approximate geodetic delta at current zoom
function pxToDeg(dpx, dpy) {
  const s = projection.scale();
  return [dpy / s * R2D, dpx / s * R2D];
}

svg.on('mousedown touchstart', function(evt) {
  // FIX #2: if 2 fingers are already down, let the pinch handler own it
  if (evt.touches && evt.touches.length === 2) return;
  evt.preventDefault();

  const src  = evt.touches ? evt.touches[0] : evt;
  // FIX #10: offset by SVG bounding rect so coords are SVG-relative on mobile
  const rect = svg.node().getBoundingClientRect();
  const cx   = src.clientX - rect.left;
  const cy   = src.clientY - rect.top;

  const target  = document.elementFromPoint(src.clientX, src.clientY);
  const hitBeam = beams.find(b => b.svgEl.node() === target);

  if (hitBeam) {
    selectedId = hitBeam.id;
    dragMode   = 'beam';
    dragBeamId = hitBeam.id;
    beamPx0    = [cx, cy];
    boreLat0   = hitBeam.boreLat;
    boreLon0   = hitBeam.boreLon;
    renderBeamList(); syncInputs(); scheduleRedraw(true);
  } else {
    dragMode  = 'globe';
    rotStart  = [cx, cy];
    rotOrigin = projection.rotate().slice();
  }
}, { passive: false });

svg.on('mousemove touchmove', function(evt) {
  if (!dragMode) return;
  // FIX #2: don't process single-touch move while a pinch is active
  if (evt.touches && evt.touches.length === 2) return;
  evt.preventDefault();

  const src  = evt.touches ? evt.touches[0] : evt;
  const rect = svg.node().getBoundingClientRect();
  const cx   = src.clientX - rect.left;
  const cy   = src.clientY - rect.top;

  if (dragMode === 'beam') {
    const beam = beams.find(b => b.id === dragBeamId);
    if (!beam) return;
    const [dLat, dLon] = pxToDeg(cx - beamPx0[0], cy - beamPx0[1]);
    beam.boreLat = Math.max(-LAT_CLAMP, Math.min(LAT_CLAMP, boreLat0 - dLat));
    beam.boreLon = wrapLon(boreLon0 + dLon);   // FIX #8
    scheduleRedraw(true);

  } else if (dragMode === 'globe') {
    const sens = GLOBE_SENS / zoomScale;        // FIX #12: scale with zoom
    projection.rotate([
      rotOrigin[0] + (cx - rotStart[0]) * sens,
      rotOrigin[1] - (cy - rotStart[1]) * sens
    ]);
    scheduleRedraw(true);
  }
}, { passive: false });

svg.on('mouseup mouseleave touchend touchcancel', function() {
  dragMode = null; dragBeamId = null;
  scheduleRedraw(false);
});

svg.on('wheel', function(evt) {
  evt.preventDefault();
  zoomScale = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX,
    zoomScale * (evt.deltaY < 0 ? ZOOM_WHEEL : 1 / ZOOM_WHEEL)));
  applyZoom();
}, { passive: false });

// ── FIX #2: Pinch zoom fully isolated — clears dragMode on 2-finger start ────
svg.on('touchstart.pinch', function(evt) {
  if (evt.touches.length !== 2) return;
  evt.preventDefault();
  dragMode = null;   // cancel any concurrent single-touch drag
  pinchD0  = Math.hypot(
    evt.touches[0].clientX - evt.touches[1].clientX,
    evt.touches[0].clientY - evt.touches[1].clientY
  );
}, { passive: false });

svg.on('touchmove.pinch', function(evt) {
  if (evt.touches.length !== 2 || !pinchD0) return;
  evt.preventDefault();
  const d = Math.hypot(
    evt.touches[0].clientX - evt.touches[1].clientX,
    evt.touches[0].clientY - evt.touches[1].clientY
  );
  zoomScale = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, zoomScale * (d / pinchD0)));
  pinchD0 = d;
  applyZoom();
}, { passive: false });

svg.on('touchend.pinch touchcancel.pinch', () => { pinchD0 = null; });

document.getElementById('btn-zi').addEventListener('click', () => {
  zoomScale = Math.min(ZOOM_MAX, zoomScale * ZOOM_BTN); applyZoom();
});
document.getElementById('btn-zo').addEventListener('click', () => {
  zoomScale = Math.max(ZOOM_MIN, zoomScale / ZOOM_BTN); applyZoom();
});

// ── Keyboard nudge (FIX #8: lon wrap) ────────────────────────────────────────
document.addEventListener('keydown', function(evt) {
  const beam = selectedBeam();
  if (!beam) return;
  if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
  const ARROWS = { ArrowUp: 1, ArrowDown: 1, ArrowLeft: 1, ArrowRight: 1 };
  if (!ARROWS[evt.key]) return;
  evt.preventDefault();
  const step = (evt.shiftKey ? 10 : 1) * 0.1;
  switch (evt.key) {
    case 'ArrowUp':    beam.boreLat = Math.max(-LAT_CLAMP, Math.min(LAT_CLAMP, beam.boreLat + step)); break;
    case 'ArrowDown':  beam.boreLat = Math.max(-LAT_CLAMP, Math.min(LAT_CLAMP, beam.boreLat - step)); break;
    case 'ArrowRight': beam.boreLon = wrapLon(beam.boreLon + step); break;
    case 'ArrowLeft':  beam.boreLon = wrapLon(beam.boreLon - step); break;
  }
  scheduleRedraw();
});

// ── Controls ──────────────────────────────────────────────────────────────────
document.getElementById('add-beam-btn').addEventListener('click', () => addBeam());

// FIX #11: bind both 'input' (live) and 'change' (blur/Enter) for each control
function bindNumber(id, min, max, handler) {
  const el = document.getElementById(id);
  function handle() {
    const v = Math.max(min, Math.min(max, +this.value));
    this.value = v;
    handler(v);
  }
  el.addEventListener('input',  handle);
  el.addEventListener('change', handle);
}

bindNumber('sl-satlon', -180, 180, v => {
  const delta = v - cfg.satLon;
  cfg.satLon  = v;
  beams.forEach(b => { b.boreLon = wrapLon(b.boreLon + delta); }); // FIX #8
  const rot = projection.rotate();
  projection.rotate([rot[0] - delta, rot[1]]);
  // FIX #17: no geoPath reassignment
  scheduleRedraw();
});

bindNumber('sl-major', 0.1, 20, v => {
  const b = selectedBeam(); if (b) { b.major = v; scheduleRedraw(); }
});
bindNumber('sl-minor', 0.1, 20, v => {
  const b = selectedBeam(); if (b) { b.minor = v; scheduleRedraw(); }
});
bindNumber('sl-rot', -180, 180, v => {
  const b = selectedBeam(); if (b) { b.rot = v; scheduleRedraw(); }
});
bindNumber('sl-elev', 0, 30, v => {
  cfg.minElev = v; scheduleRedraw();
});

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  W = wrap.clientWidth; H = wrap.clientHeight;
  baseR = Math.min(W, H) * GLOBE_RATIO;
  R = baseR;
  svg.attr('width', W).attr('height', H);
  projection.translate([W/2, H/2]).scale(R);

  addBeam(20, null, 2.0, 2.0, 0);

  try {
    const topo = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    landPaths  = lyrLand.selectAll('path')
      .data(topojson.feature(topo, topo.objects.countries).features)
      .join('path').attr('class', 'land');
    scheduleRedraw();
  } catch(e) {
    console.error('World atlas load failed:', e);
  }

  projection.rotate([-cfg.satLon, -20]);
  // FIX #17: no geoPath reassignment
  scheduleRedraw();
}

window.addEventListener('resize', () => {
  W = wrap.clientWidth; H = wrap.clientHeight;
  baseR = Math.min(W, H) * GLOBE_RATIO;
  R = baseR * zoomScale;
  svg.attr('width', W).attr('height', H);
  projection.translate([W/2, H/2]).scale(R);
  scheduleRedraw();
});

init();
</script>
</body>
